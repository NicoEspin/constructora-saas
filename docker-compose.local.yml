services:
  postgres:
    image: postgres:17-alpine
    container_name: constructora_postgres_local
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d saas']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: constructora_redis_local
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: ./constructora-api
      dockerfile: Dockerfile.dev
    container_name: constructora_api_local
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saas?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      JWT_ACCESS_SECRET: local-access-secret
      JWT_REFRESH_SECRET: local-refresh-secret
      JWT_REFRESH_EXPIRES_IN: 7d
      LOG_LEVEL: info
      TRACING_ENABLED: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'
    volumes:
      - ./constructora-api:/app
      - api_node_modules:/app/node_modules
    command: >
      sh -c "npm run prisma:generate && npx prisma migrate deploy && npm run start:dev"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3000/api/health/liveness\").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ./constructora-app
      dockerfile: Dockerfile.dev
    container_name: constructora_web_local
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      BACKEND_URL: http://api:3000
      NEXT_PUBLIC_SENTRY_DISABLED: 'true'
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '3001:3000'
    volumes:
      - ./constructora-app:/app
      - web_node_modules:/app/node_modules
    command: >
      sh -c "npm run dev -- --hostname 0.0.0.0 --port 3000"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3000\").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  dbgate:
    image: dbgate/dbgate:latest
    container_name: constructora_dbgate_local
    restart: unless-stopped
    profiles: ['tools']
    ports:
      - '3100:3000'
    volumes:
      - dbgate_data:/root/.dbgate
    environment:
      CONNECTIONS: pg
      LABEL_pg: PostgreSQL
      SERVER_pg: postgres
      USER_pg: postgres
      PASSWORD_pg: postgres
      PORT_pg: 5432
      ENGINE_pg: postgres@dbgate-plugin-postgres
      DATABASE_pg: saas
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  dbgate_data:
  api_node_modules:
  web_node_modules:
